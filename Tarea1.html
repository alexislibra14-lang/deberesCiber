<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Software Dev - Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/dist/css/all.min.css">
    <style>
        :root {
            --primary: #8b5cf6;
            --secondary: #3b82f6;
            --accent: #10b981;
            --bg-dark: #050507;
            --glass: rgba(15, 15, 25, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-dark);
            color: #fff;
            font-family: 'Inter', 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .animated-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: 
                linear-gradient(to bottom, rgba(5, 5, 7, 0.8), rgba(5, 5, 7, 0.9)),
                url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
        }

        .main-container {
            width: 95%;
            max-width: 1200px;
            z-index: 1;
            animation: slideUp 0.8s ease-out;
        }

        .hero-section {
            width: 100%;
            text-align: left;
            margin-bottom: 30px;
            border-left: 4px solid var(--primary);
            padding-left: 20px;
        }

        /* ESTILO DEL BOTÓN REGRESAR */
        .btn-back {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            color: #fff;
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 12px;
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 20px;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .btn-back:hover {
            background: rgba(139, 92, 246, 0.2);
            border-color: var(--primary);
            transform: translateX(-5px);
            box-shadow: 0 0 20px rgba(139, 92, 246, 0.3);
        }

        .hero-section h1 {
            font-size: 3rem;
            margin: 0;
            letter-spacing: -1px;
            background: linear-gradient(90deg, #fff, var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .content-layout {
            display: flex;
            gap: 30px;
            align-items: stretch;
            justify-content: center;
        }

        .video-wrapper {
            flex: 1.2; 
            min-width: 300px;
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 12px;
            box-shadow: 0 0 40px rgba(139, 92, 246, 0.15);
        }

        .video-container {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%; 
            height: 0;
            overflow: hidden;
            border-radius: 15px;
            background: #000;
        }

        .video-container iframe {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            border: none;
        }

        .code-window {
            flex: 0.8;
            background: #1e1e2e;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            border: 1px solid var(--glass-border);
        }

        .code-header {
            background: #313244;
            padding: 10px 20px;
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .dot { width: 12px; height: 12px; border-radius: 50%; }
        .red { background: #f38ba8; }
        .yellow { background: #f9e2af; }
        .green { background: #a6e3a1; }

        .code-description {
            padding: 20px;
            margin: 0;
            color: #cdd6f4;
            font-family: 'Fira Code', monospace;
            font-size: 0.85rem;
            line-height: 1.5;
            overflow-x: auto;
        }

        .tech-badge {
            background: rgba(16, 185, 129, 0.1);
            color: var(--accent);
            padding: 5px 15px;
            border-radius: 100px;
            font-size: 0.75rem;
            font-weight: 700;
            border: 1px solid var(--accent);
            margin-bottom: 10px;
            display: inline-block;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 900px) {
            .content-layout {
                flex-direction: column;
                align-items: center;
            }
            .video-wrapper, .code-window {
                width: 100%;
                max-width: 600px;
            }
        }
    </style>
</head>
<body>

    <div class="animated-bg"></div>

    <div class="main-container">
        <header class="hero-section">
            <a href="Interfaz.html" class="btn-back">
                <i class="fas fa-arrow-left"></i> Regresar al Menú
            </a>
            <br>
            <div class="tech-badge">
                <i class="fas fa-terminal"></i> STABLE_BUILD_V1.0
            </div>
            <h1>Dev_Environment</h1>
        </header>

        <div class="content-layout">
            
            <div class="video-wrapper">
                <div class="video-container">
                    <iframe 
                        src="https://drive.google.com/file/d/10L_N22GwwT3Cseb7MNVeoFJHYMf7vLta/preview" 
                        allow="autoplay" 
                        allowfullscreen>
                    </iframe>
                </div>
            </div>

            <div class="code-window">
                <div class="code-header">
                    <div class="dot red"></div>
                    <div class="dot yellow"></div>
                    <div class="dot green"></div>
                    <span style="margin-left: 10px; font-size: 0.7rem; color: #94a3b8; font-family: monospace;">logic_check.py</span>
                </div>
                <pre class="code-description">
# Solicitamos el número
numero = int(input("Ingresa un número: "))

# Comparamos con el límite
if numero > 50:
    print("Es mayor que 50")
else:
    print("No es mayor que 50")</pre>
            </div>

        </div>
    </div>

</body>
</html>
